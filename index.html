<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#14213d">
<title>Payroll Manager</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{font-family:Inter,Arial,sans-serif;color:#14213d;background:#f4f7fb}*{box-sizing:border-box}body{margin:0}.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}aside{background:#14213d;color:#fff;padding:28px 18px}.brand{font-size:22px;font-weight:800;margin:0 10px 32px}.brand span{color:#fca311}nav{display:grid;gap:8px}nav button{border:0;background:transparent;color:#cbd5e1;padding:13px 14px;text-align:left;border-radius:10px;font-size:15px;cursor:pointer}nav button.active,nav button:hover{background:#25365d;color:#fff}main{padding:28px 34px;overflow:hidden}header{margin-bottom:22px}h1{margin:0;font-size:30px}header p{margin:6px 0 0;color:#64748b}.card{background:#fff;border:1px solid #e5eaf1;border-radius:16px;padding:20px;box-shadow:0 8px 26px #14213d0f}.grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:18px;align-items:end;margin-bottom:18px}.split{display:grid;grid-template-columns:380px 1fr;gap:20px}label{display:grid;gap:7px;font-size:13px;font-weight:700;color:#475569}input,select{width:100%;border:1px solid #cbd5e1;border-radius:9px;padding:10px 11px;font:inherit;background:#fff}input:focus,select:focus{outline:2px solid #fca31133;border-color:#fca311}.metric{display:grid;gap:4px}.metric span,.totals span{font-size:13px;color:#64748b}.metric strong,.totals strong{font-size:25px}.table-wrap{overflow:auto;padding:0}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:14px 16px;border-bottom:1px solid #edf1f6;text-align:left}th{font-size:12px;text-transform:uppercase;color:#64748b;background:#f8fafc}td small{display:block;color:#64748b;margin-top:3px}.totals{display:flex;justify-content:flex-end;align-items:center;gap:34px;margin-top:18px}.totals div{display:grid}.btn{border:0;border-radius:10px;padding:11px 16px;font-weight:800;cursor:pointer}.primary{background:#fca311;color:#14213d}.dark{background:#14213d;color:#fff}.danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;border-radius:8px;padding:7px 10px;cursor:pointer}.form{display:grid;gap:14px}.employee-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #edf1f6}.employee-row div{display:grid;gap:4px}.employee-row span{font-size:13px;color:#64748b}.actions{display:flex;justify-content:flex-end;gap:10px;margin-bottom:14px}.notice{padding:12px 15px;background:#ecfdf5;border:1px solid #a7f3d0;color:#047857;border-radius:10px;margin-bottom:16px}.hidden{display:none!important}.empty{padding:24px;color:#64748b}.section-title{margin-top:0}
@media(max-width:1100px){.grid{grid-template-columns:1fr 1fr}.metric{grid-column:span 2}}@media(max-width:900px){.app{grid-template-columns:1fr}aside{padding:15px}.brand{margin-bottom:14px}nav{grid-template-columns:repeat(4,1fr)}nav button{text-align:center;font-size:12px;padding:10px 5px}main{padding:20px 14px}.grid,.split{grid-template-columns:1fr}.metric{grid-column:auto}.totals{justify-content:space-between;gap:10px;flex-wrap:wrap}}
</style>
</head>
<body>
<div class="app">
<aside><div class="brand">Payroll<span>Manager</span></div><nav>
<button data-tab="payroll" class="active">Weekly Payroll</button><button data-tab="employees">Employees</button><button data-tab="summary">Employee Summary</button><button data-tab="history">Payroll History</button>
</nav></aside>
<main>
<header><h1 id="pageTitle">Weekly Payroll</h1><p>Realtime payroll records powered by Firebase.</p></header>
<div id="notice" class="notice hidden"></div>
<section id="payrollSection">
<div class="card grid"><label>Employee<select id="employeeSelect"><option value="">Select employee</option></select></label><label>Payroll start date<input id="payrollStartDate" type="date"></label><label>Payroll end date<input id="payrollEndDate" type="date"></label><div class="metric"><span>Hourly rate</span><strong id="rateDisplay">$0.00</strong></div></div>
<div class="card table-wrap"><table><thead><tr><th>Day</th><th>Clock In</th><th>Clock Out</th><th>Break (min)</th><th>Hours</th></tr></thead><tbody id="timeRows"></tbody></table></div>
<div class="totals"><div><span>Total hours</span><strong id="totalHours">0.00</strong></div><div><span>Gross pay</span><strong id="grossPay">$0.00</strong></div><button id="savePayroll" class="btn primary">Save Payroll</button></div>
</section>
<section id="employeesSection" class="hidden"><div class="split">
<form id="employeeForm" class="card form"><h2 class="section-title">Add new employee</h2><label>Full name<input id="empName" required></label><label>Employee ID<input id="empNumber"></label><label>Email<input id="empEmail" type="email"></label><label>Phone<input id="empPhone"></label><label>Hourly rate<input id="empRate" required type="number" min="0" step="0.01"></label><button class="btn primary">Add Employee</button></form>
<div class="card"><h2 class="section-title">All employees</h2><div id="employeeList"></div></div></div></section>
<section id="summarySection" class="hidden"><div class="actions"><button id="summaryExcel" class="btn dark">Export Excel</button><button id="summaryPdf" class="btn dark">Export PDF</button></div><div class="card table-wrap"><table><thead><tr><th>Employee</th><th>Payroll Records</th><th>Total Hours</th><th>Total Earned</th></tr></thead><tbody id="summaryRows"></tbody></table></div></section>
<section id="historySection" class="hidden"><div class="actions"><button id="historyExcel" class="btn dark">Export Excel</button><button id="historyPdf" class="btn dark">Export PDF</button></div><div class="card table-wrap"><table><thead><tr><th>Employee</th><th>Payroll Start</th><th>Payroll End</th><th>Rate</th><th>Hours</th><th>Amount Earned</th><th></th></tr></thead><tbody id="historyRows"></tbody></table></div></section>
</main></div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import{getDatabase,ref,onValue,push,set,remove}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';
const firebaseConfig={apiKey:'AIzaSyDnyxAjuambKegUkyMc-yWHEdMMRgdgsVU',authDomain:'payroll-fd56f.firebaseapp.com',projectId:'payroll-fd56f',storageBucket:'payroll-fd56f.firebasestorage.app',messagingSenderId:'191190737335',appId:'1:191190737335:web:5ad07a94330b47ff024832',measurementId:'G-BNYCJ00ZZL',databaseURL:'https://payroll-fd56f-default-rtdb.firebaseio.com'};
const db=getDatabase(initializeApp(firebaseConfig));
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];let employees={},history={};
const $=id=>document.getElementById(id);const money=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(n||0));
const today=new Date();const endDate=today.toISOString().slice(0,10);const start=new Date(today);start.setDate(today.getDate()-6);$('payrollStartDate').value=start.toISOString().slice(0,10);$('payrollEndDate').value=endDate;
$('timeRows').innerHTML=DAYS.map(d=>`<tr data-day="${d}"><td><strong>${d}</strong></td><td><input class="clock-in" type="time"></td><td><input class="clock-out" type="time"></td><td><input class="break" type="number" min="0" value="0"></td><td class="hours">0.00</td></tr>`).join('');
function hoursBetween(a,b,br=0){if(!a||!b)return 0;const[ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);let m=bh*60+bm-(ah*60+am);if(m<0)m+=1440;return Math.max(0,m-Number(br||0))/60}
function selectedEmployee(){return employees[$('employeeSelect').value]||null}
function calculate(){let total=0;document.querySelectorAll('#timeRows tr').forEach(r=>{const h=hoursBetween(r.querySelector('.clock-in').value,r.querySelector('.clock-out').value,r.querySelector('.break').value);r.querySelector('.hours').textContent=h.toFixed(2);total+=h});$('totalHours').textContent=total.toFixed(2);$('grossPay').textContent=money(total*Number(selectedEmployee()?.hourlyRate||0));return total}
document.querySelectorAll('#timeRows input').forEach(i=>i.addEventListener('input',calculate));$('employeeSelect').addEventListener('change',()=>{$('rateDisplay').textContent=money(selectedEmployee()?.hourlyRate);calculate()});
function notice(msg){$('notice').textContent=msg;$('notice').classList.remove('hidden');setTimeout(()=>$('notice').classList.add('hidden'),3500)}
function showTab(tab){const names={payroll:'Weekly Payroll',employees:'Employee Setup',summary:'Employee Summary',history:'Payroll History'};$('pageTitle').textContent=names[tab];['payroll','employees','summary','history'].forEach(x=>$(x+'Section').classList.toggle('hidden',x!==tab));document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab))}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
onValue(ref(db,'employees'),s=>{employees=s.val()||{};renderEmployees()});onValue(ref(db,'payrollHistory'),s=>{history=s.val()||{};renderHistory();renderSummary()});
function renderEmployees(){const list=Object.entries(employees);$('employeeSelect').innerHTML='<option value="">Select employee</option>'+list.map(([id,e])=>`<option value="${id}">${escapeHtml(e.name)} — ${money(e.hourlyRate)}/hr</option>`).join('');$('employeeList').innerHTML=list.length?list.map(([id,e])=>`<div class="employee-row"><div><strong>${escapeHtml(e.name)}</strong><span>${escapeHtml(e.employeeId||'No employee ID')} · ${money(e.hourlyRate)}/hr</span></div><button class="danger" data-delete-employee="${id}">Delete</button></div>`).join(''):'<p class="empty">No employees added yet.</p>';document.querySelectorAll('[data-delete-employee]').forEach(b=>b.onclick=async()=>{if(confirm('Delete this employee? Existing payroll history will remain.'))await remove(ref(db,'employees/'+b.dataset.deleteEmployee))})}
$('employeeForm').onsubmit=async e=>{e.preventDefault();const name=$('empName').value.trim(),rate=Number($('empRate').value);if(!name||rate<0)return;const r=push(ref(db,'employees'));await set(r,{name,employeeId:$('empNumber').value.trim(),email:$('empEmail').value.trim(),phone:$('empPhone').value.trim(),hourlyRate:rate,createdAt:new Date().toISOString()});e.target.reset();notice('Employee added.')};
$('savePayroll').onclick=async()=>{const emp=selectedEmployee(),total=calculate(),payrollStartDate=$('payrollStartDate').value,payrollEndDate=$('payrollEndDate').value;if(!emp)return notice('Select an employee first.');if(!payrollStartDate||!payrollEndDate)return notice('Select both payroll start and end dates.');if(payrollStartDate>payrollEndDate)return notice('Payroll start date cannot be after the end date.');if(total<=0)return notice('Enter at least one work shift.');const times={},dayHours={};document.querySelectorAll('#timeRows tr').forEach(r=>{const d=r.dataset.day,a=r.querySelector('.clock-in').value,b=r.querySelector('.clock-out').value,br=Number(r.querySelector('.break').value||0);times[d]={in:a,out:b,breakMinutes:br};dayHours[d]=hoursBetween(a,b,br)});await set(push(ref(db,'payrollHistory')),{employeeId:$('employeeSelect').value,employeeName:emp.name,employeeNumber:emp.employeeId||'',hourlyRate:Number(emp.hourlyRate),payrollStartDate,payrollEndDate,weekEnding:payrollEndDate,times,dayHours,totalHours:Number(total.toFixed(2)),grossPay:Number((total*Number(emp.hourlyRate)).toFixed(2)),createdAt:new Date().toISOString()});document.querySelectorAll('#timeRows input').forEach(i=>i.value=i.classList.contains('break')?'0':'');calculate();notice('Payroll saved.');showTab('history')};
function historyArray(){return Object.entries(history).map(([id,v])=>({id,...v})).sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt)))}
function renderHistory(){const rows=historyArray();$('historyRows').innerHTML=rows.length?rows.map(r=>`<tr><td><strong>${escapeHtml(r.employeeName)}</strong><small>${escapeHtml(r.employeeNumber||'')}</small></td><td>${r.payrollStartDate||''}</td><td>${r.payrollEndDate||r.weekEnding||''}</td><td>${money(r.hourlyRate)}</td><td>${Number(r.totalHours||0).toFixed(2)}</td><td>${money(r.grossPay)}</td><td><button class="danger" data-delete-payroll="${r.id}">Delete</button></td></tr>`).join(''):'<tr><td colspan="7" class="empty">No payroll history yet.</td></tr>';document.querySelectorAll('[data-delete-payroll]').forEach(b=>b.onclick=async()=>{if(confirm('Permanently delete this payroll record?'))await remove(ref(db,'payrollHistory/'+b.dataset.deletePayroll))})}
function summaryArray(){const x={};historyArray().forEach(r=>{if(!x[r.employeeId])x[r.employeeId]={employeeName:r.employeeName,payrollCount:0,hours:0,earnings:0};x[r.employeeId].payrollCount++;x[r.employeeId].hours+=Number(r.totalHours||0);x[r.employeeId].earnings+=Number(r.grossPay||0)});Object.entries(employees).forEach(([id,e])=>{if(!x[id])x[id]={employeeName:e.name,payrollCount:0,hours:0,earnings:0}});return Object.values(x).sort((a,b)=>a.employeeName.localeCompare(b.employeeName))}
function renderSummary(){const rows=summaryArray();$('summaryRows').innerHTML=rows.length?rows.map(r=>`<tr><td><strong>${escapeHtml(r.employeeName)}</strong></td><td>${r.payrollCount}</td><td>${r.hours.toFixed(2)}</td><td>${money(r.earnings)}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">No employees or payroll records yet.</td></tr>'}
function exportExcel(rows,name){const data=rows.map(r=>({'Employee':r.employeeName,'Employee ID':r.employeeNumber||'','Payroll Start Date':r.payrollStartDate||'','Payroll End Date':r.payrollEndDate||r.weekEnding||'','Hourly Rate':Number(r.hourlyRate||0),'Hours Worked':Number(r.totalHours??r.hours??0),'Amount Earned':Number(r.grossPay??r.earnings??0)}));const ws=XLSX.utils.json_to_sheet(data),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Payroll');XLSX.writeFile(wb,name)}
function exportPdf(rows,name){const{jsPDF}=window.jspdf,doc=new jsPDF({orientation:'landscape'});doc.setFontSize(18);doc.text('Payroll Report',14,16);doc.autoTable({startY:22,head:[['Employee','Employee ID','Start Date','End Date','Hourly Rate','Hours','Amount Earned']],body:rows.map(r=>[r.employeeName,r.employeeNumber||'',r.payrollStartDate||'',r.payrollEndDate||r.weekEnding||'',money(r.hourlyRate||0),Number(r.totalHours??r.hours??0).toFixed(2),money(r.grossPay??r.earnings??0)])});doc.save(name)}
$('historyExcel').onclick=()=>exportExcel(historyArray(),'payroll-history.xlsx');$('historyPdf').onclick=()=>exportPdf(historyArray(),'payroll-history.pdf');$('summaryExcel').onclick=()=>exportExcel(summaryArray(),'employee-summary.xlsx');$('summaryPdf').onclick=()=>exportPdf(summaryArray(),'employee-summary.pdf');
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
</script>
</body>
</html>
